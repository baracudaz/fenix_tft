rules:
  # Bronze (mandatory)
  action-setup: done
  appropriate-polling: done
  brands:
    status: exempt
    comment: Not a branded integration requiring a separate brands repository entry.
  common-modules: done
  config-flow-test-coverage:
    status: done
    comment: >
      Config flow is covered by tests/components/fenix_tft/test_config_flow.py (10 tests):
      user flow success/error/duplicate, reauth success/invalid-auth,
      reconfigure success/username-mismatch, and validate_input helper paths.
  config-flow: done
  dependency-transparency: done
  docs-actions: done
  docs-high-level-description:
    status: todo
    comment: README and info.md should be expanded with a proper high-level description.
  docs-installation-instructions:
    status: todo
    comment: Installation section in docs needs step-by-step instructions.
  docs-removal-instructions:
    status: todo
    comment: Removal/uninstall instructions not yet documented.
  entity-event-setup: done
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done

  # Silver
  action-exceptions: done
  config-entry-unloading: done
  docs-configuration-parameters:
    status: todo
    comment: Service parameters and config options need documentation.
  docs-installation-parameters:
    status: todo
    comment: Installation parameters need dedicated documentation section.
  entity-unavailable: done
  integration-owner: done
  log-when-unavailable:
    status: todo
    comment: >
      Coordinator logs each poll failure but does not implement the log-once pattern
      (log info when first becoming unavailable, log info again on recovery).
  parallel-updates: done
  reauthentication-flow: done
  test-coverage:
    status: done
    comment: >
      33 tests across test_config_flow.py (10), test_coordinator.py (10), and
      test_climate.py (13). Covers config flow paths, coordinator update/error/repair
      logic, optimistic updates, climate entity state, temperature bounds, preset and
      HVAC mode handling, and holiday locking. sensor.py and statistics.py remain
      uncovered; full 95% coverage is a future goal.
