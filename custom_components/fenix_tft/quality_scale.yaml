rules:
  # Bronze (mandatory)
  action-setup: done
  appropriate-polling: done
  brands:
    status: exempt
    comment: Not a branded integration requiring a separate brands repository entry.
  common-modules: done
  config-flow-test-coverage:
    status: todo
    comment: No automated tests currently exist; test infrastructure needs to be added.
  config-flow: done
  dependency-transparency: done
  docs-actions: done
  docs-high-level-description:
    status: todo
    comment: README and info.md should be expanded with a proper high-level description.
  docs-installation-instructions:
    status: todo
    comment: Installation section in docs needs step-by-step instructions.
  docs-removal-instructions:
    status: todo
    comment: Removal/uninstall instructions not yet documented.
  entity-event-setup: done
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done

  # Silver
  action-exceptions: done
  config-entry-unloading: done
  docs-configuration-parameters:
    status: todo
    comment: Service parameters and config options need documentation.
  docs-installation-parameters:
    status: todo
    comment: Installation parameters need dedicated documentation section.
  entity-unavailable: done
  integration-owner: done
  log-when-unavailable:
    status: todo
    comment: Unavailability is not explicitly logged once; coordinator logs each poll failure.
  parallel-updates: done
  reauthentication-flow: done
  test-coverage:
    status: todo
    comment: No automated tests exist; minimum 95% coverage required.
